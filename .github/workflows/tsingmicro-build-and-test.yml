name: Tsingmicro-Build-And-Test

on:
  push:
    branches: [ "triton_v3.3.x" ]
  pull_request:
    branches: [ "triton_v3.3.x" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tsingmicro-build-and-test:
    runs-on: tsingmicro
    if: ${{ github.repository == 'FlagTree/flagtree' || github.repository == 'flagos-ai/flagtree' }}
    steps:
      - name: Smart Checkout
        uses: flagos-ai/FlagTree/.github/actions/smart-checkout@main
        with:
          checkout_version: 'v6'

      - name: Check if backend-relevant files changed
        id: check_backend
        uses: flagos-ai/FlagTree/.github/actions/check-backend-changed@main
        with:
          backend: tsingmicro

      - name: FlagTree Build on Tsingmicro
        if: steps.check_backend.outputs.should_skip != 'true'
        shell: bash
        run: |
          set -x
          pip uninstall -y triton
          source ~/env.sh
          export FLAGTREE_BACKEND=tsingmicro
          cd python
          python3.11 -m pip install . --no-build-isolation -v

      - name: FlagTree Test on Tsingmicro
        if: steps.check_backend.outputs.should_skip != 'true'
        shell: bash
        run: |
          set -x
          source ~/env.sh
          python3.11 -c 'import triton; print(triton.__path__)'
          /usr/local/lib/python3.11/dist-packages/triton/backends/tsingmicro/bin/tsingmicro-opt --version
